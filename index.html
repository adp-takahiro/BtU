<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1a1a1a">
<title>bookmark</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
  <header class="header">
    <div class="header-logo">bookmark</div>
    <div class="header-sub">URLをペーストしてブックマーク化</div>
    <div class="header-spacer"></div>
    <button id="authBtn" class="nav-btn">接続中...</button>
    <span id="countBadge" class="count-badge">0 件</span>
  </header>
  <main class="main">
    <div class="topbar">
      <input id="urlInput" class="url-input" type="url"
      placeholder="ここにペーストしたURLからブックマークカードを作成"
      autocomplete="off" spellcheck="false">
      <button id="addBtn" class="add-btn">追加</button>
    </div>

    <div id="tagBar" class="tag-bar"></div>

    <div class="content">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">🔗</div>
        <div class="empty-label">URLをペーストしてリストに追加</div>
        <div class="empty-hint">自動取得に失敗しても、後から手動で個別に編集できます</div>
      </div>
      <div class="card-grid" id="cardGrid" style="display:none"></div>
    </div>
  </main>
</div>
<script type="module" src="script.js"></script>
</body>
</html>
